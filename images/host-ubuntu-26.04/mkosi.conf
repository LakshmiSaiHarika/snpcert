[Include]
Include=../../modules/build/host

[Distribution]
Distribution=ubuntu
Release=resolute
Repositories=main,universe
RepositoryKeyFetch=yes

[Content]
Packages=
	    linux-modules-*-generic
	    linux-image-generic
	    linux-modules-extra-*
	    systemd
	    systemd-boot-efi
	    systemd-resolved
	    network-manager
	    plymouth
	    login.defs
	    login
	    systemd-journal-remote
	    qemu-system
	    apt
	    ovmf
	    xxd
	    python3
	    python3-dev
	    python3-pip
	    python3-emoji
	    jq
	    apt
	    avahi-daemon
	    g++
	    g++-x86-64-linux-gnu
KernelModulesExclude=nvidia.*

[Build]
Environment=VERSION="26.04"
